name: DevSecOps Workflow - End to End Pipeline

on:
  push: 
    branches: [main]  
  
jobs:
  
    code-quality:
        uses: ./.github/workflows/code-quality.yml
    
    secret-scan:
        uses: ./.github/workflows/secret-scan.yml
    
    dependency-scan:
        uses: ./.github/workflows/dependency-scan.yml
    
    docker-lint:
        uses: ./.github/workflows/docker-lint.yml

    
    build-push:
        needs: [code-quality, secret-scan, dependency-scan, docker-lint]
        uses: ./.github/workflows/build-push.yml
        secrets: inherit

    image-scan:
        needs: build-push
        uses: ./.github/workflows/image-scan.yml
        secrets: inherit