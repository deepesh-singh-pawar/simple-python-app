# Using trivy to scan for vulnerabilities in container images
name: Image Scanner
on:
  workflow_call:

jobs:
    trivy-scan:
        runs-on: ubuntu-latest
        steps:
          - name: Log in to Docker Hub
            uses: docker/login-action@v2
            with:
              username: ${{ secrets.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKER_PASSWORD }}
          - name: Scan Docker image with Trivy
            uses: aquasecurity/trivy-action@v0.33.1
            with:
              image-ref: ${{ secrets.DOCKER_USERNAME}}/simple-python-app:latest
                          
              format: json
              output: trivy-results.json
              severity: HIGH,CRITICAL
              #exit-code: '1' # Fail the workflow if vulnerabilities are found
              only-fixed: true # Only report vulnerabilities that have fixes available
          - name: Upload Trivy report
            uses: actions/upload-artifact@v4
            with:
              name: trivy-security-report
              path: trivy-results.json