name: Deploy App to EC2

on:
    workflow_call:

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4


      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/simple-python-app:{{ github.sha }} .


      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/simple-python-app:{{ github.sha }}


      - name: Deploy to EC2 server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "Updating packages..."
            sudo apt-get update -y

            echo "Installing Docker if missing..."
            if ! command -v docker &> /dev/null
              then
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
            else
              echo "Docker already installed"
            fi

            echo "Deploying container..."

            sudo docker stop python-app || true
            sudo docker rm python-app || true

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/simple-python-app:{{ github.sha }}

            sudo docker run -d \
              --restart always \
              -p 5000:5000 \
              --name python-app \
              ${{ secrets.DOCKER_USERNAME }}/simple-python-app:{{ github.sha }}